app            = "koda-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PHX_HOST = "api.koda.fyi"
  PORT     = "8080"
  MIX_ENV  = "prod"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  size   = "shared-cpu-1x"
  memory = "1024mb"
